<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editing} ? 'Cập nhật học phần' : 'Thêm học phần'">Course Form</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page-shell">
    <div class="page-orb orb-one"></div>
    <div class="page-orb orb-two"></div>

    <div th:replace="~{fragments/header :: siteHeader('')}"></div>

    <main class="content">
        <section class="form-card">
            <div class="section-head">
                <div>
                    <p class="eyebrow">ADMIN</p>
                    <h1 th:text="${editing} ? 'Cập nhật học phần' : 'Create Course'">Create Course</h1>
                </div>
                <a class="btn btn-ghost" th:href="@{/admin/courses}">Quay lại</a>
            </div>

            <form class="course-form"
                  th:if="${editing}"
                  th:object="${courseForm}"
                  th:action="@{/admin/courses/edit/{id}(id=${courseId})}"
                  method="post">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div th:replace="~{fragments/course-form-fields :: fields}"></div>
            </form>

            <form class="course-form"
                  th:if="${!editing}"
                  th:object="${courseForm}"
                  th:action="@{/admin/courses/create}"
                  method="post">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div th:replace="~{fragments/course-form-fields :: fields}"></div>
            </form>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: siteFooter}"></div>
</div>
</body>
</html>
