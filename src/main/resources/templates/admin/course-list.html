<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý học phần</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page-shell">
    <div class="page-orb orb-one"></div>
    <div class="page-orb orb-two"></div>

    <div th:replace="~{fragments/header :: siteHeader('')}"></div>

    <main class="content">
        <section class="section-card">
            <div class="section-head">
                <div>
                    <p class="eyebrow">ADMIN</p>
                    <h1>Quản lý học phần</h1>
                </div>
                <div class="table-actions">
                    <a class="btn btn-ghost" th:href="@{/admin/categories}">Quản lý danh mục</a>
                    <a class="btn btn-primary" th:href="@{/admin/courses/create}">+ Create Course</a>
                </div>
            </div>

            <section class="alert-stack">
                <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            </section>

            <div class="hero-stats admin-stats">
                <div class="stat-card">
                    <strong th:text="${#lists.size(courses)}">0</strong>
                    <span>Tổng học phần</span>
                </div>
                <div class="stat-card">
                    <strong th:text="${registeredStudentCount}">0</strong>
                    <span>Sinh viên đã đăng ký môn</span>
                </div>
            </div>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Học phần</th>
                        <th>Danh mục</th>
                        <th>Tín chỉ</th>
                        <th>Giảng viên</th>
                        <th>Đã đăng ký</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.id}">1</td>
                        <td>
                            <div class="table-course">
                                <img th:src="${course.image}" th:alt="${course.name}">
                                <span th:text="${course.name}">Tên học phần</span>
                            </div>
                        </td>
                        <td th:text="${course.category.name}">Danh mục</td>
                        <td th:text="${course.credits}">3</td>
                        <td th:text="${course.lecturer}">GV</td>
                        <td class="count-cell">
                            <span class="category-chip count-chip"
                                  th:text="${courseEnrollmentCounts[course.id] ?: 0} + ' sinh viên'">0 sinh viên</span>
                        </td>
                        <td>
                            <div class="table-actions">
                                <a class="btn btn-ghost" th:href="@{/admin/courses/edit/{id}(id=${course.id})}">Update</a>
                                <form th:action="@{/admin/courses/delete/{id}(id=${course.id})}" method="post">
                                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-danger" type="submit" onclick="return confirm('Bạn chắc chắn muốn xóa học phần này?')">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: siteFooter}"></div>
</div>
</body>
</html>
