<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="siteHeader(searchKeyword)" class="site-header">
    <div class="topbar">
        <a class="brand" th:href="@{/home}">
            <span class="brand-mark">CR</span>
            <span class="brand-copy">
                <strong>Course Registration</strong>
                <small>Spring Boot Course Hub</small>
            </span>
        </a>

        <nav class="top-links">
            <a th:href="@{/home}">Trang chủ</a>
            <a th:if="${isStudent}" th:href="@{/enroll/my-courses}">My Courses</a>
            <a th:if="${isAdmin}" th:href="@{/admin/courses}">Quản lý học phần</a>
            <a th:if="${isAdmin}" th:href="@{/admin/categories}">Quản lý danh mục</a>
        </nav>

        <form class="search-form" th:action="@{/courses}" method="get">
            <input type="text" name="keyword" th:value="${searchKeyword}" placeholder="Tìm kiếm theo tên học phần">
            <button type="submit">Search</button>
        </form>

        <div class="top-actions">
            <span class="user-pill" th:if="${isAuthenticated}" th:text="${currentUserName}">user</span>

            <a class="btn btn-ghost" th:if="${!isAuthenticated}" th:href="@{/login}">Đăng nhập</a>
            <a class="btn btn-primary" th:if="${!isAuthenticated}" th:href="@{/register}">Đăng ký</a>

            <form th:if="${isAuthenticated}" th:action="@{/logout}" method="post">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-ghost" type="submit">Logout</button>
            </form>
        </div>
    </div>
</header>
</body>
</html>
